<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest HTML + CSS + JS Intermediário</title>

    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/estilos.css">
</head>

<body>
    <div class="container">
        <div class="pergunta">
            <h2>FICOU COM DÚVIDA?</h2>
            <h2>NOS MANDE UMA MENSAGEM!</h2>
            <P>caso tenha ficado com qualquer dúvida <br> basta nos mandar uma mensagem e<br> entraremos em contato em menos de
                24h.</P>
        </div>
        <div class="formulario">
            <ul>
                <li><input class="nome obrigatorio" type="text" placeholder="Nome completo *"></li>
                <p class="mensagem-erro">campo obrigatório</p>
                <li><input class="email obrigatorio" type="email" placeholder="Email *"></li>
                <p class="mensagem-erro">campo obrigatório</p>
                <li><input class="telefone obrigatorio" type="tel" placeholder="Telefone *"></li>
                <p class="mensagem-erro">campo obrigatório</p>
                <li><textarea name="mensagem" id="mensagem" class="obrigatorio" placeholder="Mensagem *"></textarea></li>
                <p class="mensagem-erro">campo obrigatório</p>
            </ul>
            <p class="informativo">*campos obrigatórios</p>
            <button>Enviar</button>
        </div>
    </div>
    <script src="./src/js/script.js"></script>
</body>

</html>
